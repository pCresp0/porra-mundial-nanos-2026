name: Foto de visitas

# Toma una foto del contador de visitas cada hora para poder mostrar
# "visitas por hora" en el panel de admin. No usa ninguna cuenta externa:
# solo lee el total del contador que ya tiene la web.

on:
  schedule:
    - cron: "5 * * * *"   # cada hora, en el minuto 5
  workflow_dispatch:

permissions:
  contents: write

# Evita que dos ejecuciones se pisen al hacer commit
concurrency:
  group: snapshot-visits
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Sincronizar con main
        run: git pull --rebase origin main

      - name: Tomar foto del contador
        run: python snapshot_visits.py

      - name: Subir foto
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data/visits_log.json
          if git diff --staged --quiet; then
            echo "Sin cambios que subir"
          else
            git commit -m "chore: foto horaria de visitas ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
