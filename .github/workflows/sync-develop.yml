name: Sincronizar develop con main

on:
  schedule:
    # 23:50 hora España (CEST = UTC+2)
    - cron: "50 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Comprobar commits de hoy en main
        id: check
        run: |
          DATE=$(TZ="Europe/Madrid" date +%Y-%m-%d)
          COUNT=$(git log --oneline --after="${DATE}T00:00:00+02:00" --before="${DATE}T23:59:59+02:00" origin/main | wc -l | tr -d ' ')
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "📊 Commits en main hoy (${DATE}): ${COUNT}"

      - name: Merge main → develop
        if: steps.check.outputs.count != '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Crear develop si no existe
          if git ls-remote --exit-code origin develop >/dev/null 2>&1; then
            git checkout develop
            git pull origin develop
          else
            git checkout -b develop
            echo "🆕 Rama develop creada desde main"
          fi

          # Merge main en develop (fast-forward si es posible, merge commit si no)
          git merge origin/main --no-edit -m "chore: sync develop ← main ($(date -u +%Y-%m-%dT%H:%MZ))"
          git push origin develop

          echo "✅ develop sincronizado con main"

      - name: Sin commits hoy
        if: steps.check.outputs.count == '0'
        run: echo "⏭️ No hubo commits en main hoy — sync omitido"
