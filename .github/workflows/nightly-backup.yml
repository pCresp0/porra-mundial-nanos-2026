name: Backup nocturno

on:
  schedule:
    # 23:55 hora España (CEST = UTC+2). Ajustar a 22:55 UTC en invierno (CET).
    - cron: "55 21 * * *"
  workflow_dispatch:   # permite lanzarlo manualmente desde la UI de GitHub

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0   # historial completo para contar commits del día

      - name: Contar commits de hoy en main
        id: check
        run: |
          DATE=$(TZ="Europe/Madrid" date +%Y-%m-%d)
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

          # Commits en main cuyo author date sea hoy (hora España)
          COUNT=$(git log --oneline --after="${DATE}T00:00:00+02:00" --before="${DATE}T23:59:59+02:00" origin/main | wc -l | tr -d ' ')
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "📊 Commits en main el ${DATE}: ${COUNT}"

      - name: Crear rama backup si hubo commits
        if: steps.check.outputs.count != '0'
        run: |
          DATE="${{ steps.check.outputs.date }}"
          COUNT="${{ steps.check.outputs.count }}"
          BRANCH="backup/${DATE}_${COUNT}commits"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Crea o sobreescribe la rama apuntando al HEAD actual de main
          git checkout -b "${BRANCH}"
          git push origin "${BRANCH}" --force

          echo "✅ Rama ${BRANCH} creada desde main (${COUNT} commits hoy)"

      - name: Sin commits hoy
        if: steps.check.outputs.count == '0'
        run: echo "⏭️ No hubo commits en main hoy — backup omitido"
