name: Actualizar porra

on:
  schedule:
    # Cada 30 minutos (UTC) → cada 30 minutos hora España
    - cron: "*/30 * * * *"
  workflow_dispatch:
  push:
    paths:
      - "data/**"
      - "update_config.json"
      - "fetch_results.py"
      - "team_names.py"
      - "app.py"
      - "excel_sync.py"
      - "fixture_data.py"
      - "build_static.py"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Sincronizar resultados → Excel (API)
        run: python fetch_results.py
        continue-on-error: true

      - name: Regenerar data.json
        run: python build_static.py

      - name: Subir cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data/
          if git diff --staged --quiet; then
            echo "Sin cambios que subir"
          else
            git commit -m "chore: actualización automática de datos ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
