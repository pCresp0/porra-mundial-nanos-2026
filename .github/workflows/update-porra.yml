name: Actualizar porra

on:
  schedule:
    # Comprueba cada 5 minutos. Solo actualiza (API + Excel + data.json) si hay
    # un partido EN CURSO (marcador/puntos provisionales) o uno recién terminado
    # pendiente de resultado (ver should_update.py). Fuera de partido no hace
    # nada, así que no genera commits innecesarios.
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    paths:
      - "data/**"
      - "update_config.json"
      - "fetch_results.py"
      - "team_names.py"
      - "app.py"
      - "excel_sync.py"
      - "fixture_data.py"
      - "build_static.py"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: ¿Hay partido recién terminado?
        id: guard
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Evento ${{ github.event_name }} → ejecutar siempre"
            echo "run=yes" >> "$GITHUB_OUTPUT"
          else
            python should_update.py >> "$GITHUB_OUTPUT"
          fi

      - name: Sincronizar resultados → Excel (API)
        if: steps.guard.outputs.run == 'yes'
        run: python fetch_results.py
        continue-on-error: true

      - name: Regenerar data.json
        if: steps.guard.outputs.run == 'yes'
        run: python build_static.py

      - name: Registrar llamada API
        id: apilog
        if: steps.guard.outputs.run == 'yes'
        run: python log_api_call.py --trigger "${{ github.event_name }}" >> "$GITHUB_OUTPUT"

      - name: Subir cambios
        if: steps.guard.outputs.run == 'yes'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data/
          if git diff --staged --quiet; then
            echo "Sin cambios que subir"
          else
            if [ "${{ steps.apilog.outputs.updated }}" = "yes" ]; then
              MSG="chore: actualización automática de datos ($(date -u +%Y-%m-%dT%H:%MZ))"
            else
              MSG="chore: registro de llamada API sin cambios ($(date -u +%Y-%m-%dT%H:%MZ))"
            fi
            git commit -m "$MSG"
            git push
          fi
