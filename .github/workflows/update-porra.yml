name: Actualizar porra

on:
  schedule:
    # Comprueba cada 5 minutos. Solo actualiza (API + Excel + data.json) si hay
    # un partido EN CURSO (marcador/puntos provisionales) o uno recién terminado
    # pendiente de resultado (ver should_update.py). Fuera de partido no hace
    # nada, así que no genera commits innecesarios.
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Forzar actualización aunque no haya partido activo"
        type: boolean
        default: false
  push:
    paths:
      - "data/**"
      - "update_config.json"
      - "fetch_results.py"
      - "patch_data.py"
      - "team_names.py"
      - "app.py"
      - "excel_sync.py"
      - "fixture_data.py"
      - "build_static.py"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: ¿Hay partido activo o reciente?
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ inputs.force }}" = "true" ]; then
            echo "Evento ${{ github.event_name }} (force=${{ inputs.force }}) → ejecutar siempre"
            echo "run=yes" >> "$GITHUB_OUTPUT"
          else
            python should_update.py >> "$GITHUB_OUTPUT"
          fi

      - name: Descargar resultados de la API
        if: steps.guard.outputs.run == 'yes'
        # Solo descarga resultados/live → results.json, live.json, scorers.json
        # NO llama a build_static para no sobreescribir el data.json manual
        run: |
          python -c "
import sys, json, os
sys.path.insert(0, '.')
import fetch_results as fr
cfg = fr._load_config()
url = cfg.get('api_url', 'https://worldcup26.ir/get/games')
print(f'Descargando desde {url}...')
try:
    games = fr._fetch_games(url)
    # Build match map from data.json
    match_map = fr._load_data_json_match_map()
    fr.write_results_json(games, match_map)
    fr.write_scorers_json(games)
    fr.write_penalties_json(games)
    fr.write_live_json(games)
    print('Descarga completada')
except Exception as e:
    print(f'Error: {e}')
    sys.exit(0)  # No falla el workflow si la API no responde
"

      - name: Aplicar resultados a data.json (patch incremental)
        if: steps.guard.outputs.run == 'yes'
        run: python patch_data.py

      - name: Aplicar puntos en vivo (aunque no haya partido activo)
        if: steps.guard.outputs.run != 'yes'
        run: python patch_data.py --live-only

      - name: Buscar resúmenes DAZN en YouTube
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python fetch_highlights.py
        continue-on-error: true

      - name: Integrar highlights en data.json
        run: |
          python -c "
import json, os
BASE = '.'
highlights_path = os.path.join(BASE, 'data', 'highlights.json')
data_path = os.path.join(BASE, 'data.json')
if not os.path.isfile(highlights_path):
    print('Sin highlights.json')
    exit(0)
with open(highlights_path) as f:
    highlights = json.load(f)
with open(data_path) as f:
    dj = json.load(f)
count = 0
for m in dj.get('matches', []):
    vid = highlights.get(m.get('name', ''))
    if vid and m.get('highlights_video_id') != vid:
        m['highlights_video_id'] = vid
        count += 1
if count:
    with open(data_path, 'w') as f:
        json.dump(dj, f, ensure_ascii=False, separators=(',', ':'))
    print(f'Highlights integrados: {count}')
else:
    print('Sin nuevos highlights')
"

      - name: Subir highlights si hay nuevos (sin partido activo)
        if: steps.guard.outputs.run != 'yes'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data/highlights.json
          if git diff --staged --quiet; then
            echo "Sin nuevos resúmenes"
          else
            git commit -m "chore: nuevos resúmenes disponibles ($(date -u +%Y-%m-%dT%H:%MZ))"
            git pull --rebase origin main
            git push
          fi

      - name: Registrar llamada API
        id: apilog
        if: steps.guard.outputs.run == 'yes'
        run: python log_api_call.py --trigger "${{ github.event_name }}" >> "$GITHUB_OUTPUT"

      - name: Subir cambios
        if: steps.guard.outputs.run == 'yes'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data/
          if git diff --staged --quiet; then
            echo "Sin cambios que subir"
          else
            if [ "${{ steps.apilog.outputs.updated }}" = "yes" ]; then
              MSG="chore: actualización automática de datos ($(date -u +%Y-%m-%dT%H:%MZ))"
            else
              MSG="chore: registro de llamada API sin cambios ($(date -u +%Y-%m-%dT%H:%MZ))"
            fi
            git commit -m "$MSG"
            git pull --rebase origin main
            git push
          fi
